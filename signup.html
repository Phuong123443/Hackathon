<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Meowie CRM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="auth.css">
</head>
<body>
    <div class="auth-left">
        <div class="brand-container">
            <div class="brand-glow"></div>
            <div class="brand-logo" style="margin-bottom: 20px;">
                <img src="logo.jpg" alt="MEOWIE-CRM" style="width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid #facc15; box-shadow: 0 0 20px rgba(250, 204, 21, 0.4); animation: floating 3s ease-in-out infinite;">
            </div>
            <h2 class="brand-name">Meowie CRM</h2>
            <p class="brand-tagline">Secure, Intelligent, and Elegant Management</p>
        </div>
    </div>
    
    <div class="auth-right">
        <div class="auth-form-container">
            <h1 class="auth-title">Create an Account</h1>
            
            <form id="signup-form">
                <div id="error-message" style="color: red; margin-bottom: 10px; display: none;"></div>
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Choose a username" required>
                </div>
                
                <div class="form-group">
                    <label for="role">I am a:</label>
                    <select id="role" name="role" style="width: 100%; padding: 12px 15px; border: 1px solid var(--auth-border); border-radius: 8px; background-color: var(--auth-input-bg); font-family: var(--font-family); outline: none;" onchange="toggleDepartment()">
                        <option value="customer">Customer</option>
                        <option value="manager">Manager</option>
                    </select>
                </div>
                
                <div class="form-group" id="department-group" style="display: none;">
                    <label for="department">Select your department</label>
                    <select id="department" name="department" style="width: 100%; padding: 12px 15px; border: 1px solid var(--auth-border); border-radius: 8px; background-color: var(--auth-input-bg); font-family: var(--font-family); outline: none;">
                        <option value="Logistics">Logistics</option>
                        <option value="Quality Assurance">Quality Assurance</option>
                        <option value="Finance">Finance</option>
                        <option value="IT support">IT support</option>
                        <option value="CRM manager">CRM manager</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Create a password" required>
                </div>

                <div class="form-group">
                    <label for="confirm-password">Confirm Password</label>
                    <input type="password" id="confirm-password" name="confirm-password" placeholder="Confirm your password" required>
                </div>
                
                <button type="submit" class="auth-btn">Sign Up</button>
            </form>
            
            <div class="auth-links">
                <span>Already have an account? </span>
                <a href="login.html">Login</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const role = document.getElementById('role').value;
            const department = document.getElementById('department').value;
            const errorMsg = document.getElementById('error-message');
            
            if (password !== confirmPassword) {
                errorMsg.textContent = "Passwords do not match!";
                errorMsg.style.display = 'block';
                return;
            }

            try {
                const response = await fetch('/api/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, role, department })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    alert('Sign up successful! Please log in.');
                    window.location.href = 'login.html';
                } else {
                    errorMsg.textContent = data.error || 'Sign up failed';
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                errorMsg.textContent = 'Server error. Is the backend running?';
                errorMsg.style.display = 'block';
            }
        });
        function toggleDepartment() {
            const role = document.getElementById('role').value;
            const deptGroup = document.getElementById('department-group');
            if (role === 'manager') {
                deptGroup.style.display = 'block';
            } else {
                deptGroup.style.display = 'none';
            }
        }
    </script>
</body>
</html>
