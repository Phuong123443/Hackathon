// ================================================================
// OPENAI CLASSIFICATION
// ================================================================
async function classifyWithOpenAI(text) {
    if (!OPENAI_API_KEY || !OPENAI_API_KEY.startsWith('sk-')) {
        return classifyTextFallback(text);
    }

    const systemPrompt = `You are a customer complaint classification engine for an e-commerce CRM called Meowie CRM.
Analyze the customer message and return ONLY a JSON object with these exact fields:
{
  "category": "<one of: Shipping, Quality, Refund, Technical, Others>",
  "issue": "<short issue description, max 6 words>",
  "dept": "<one of: Logistics Team, Quality Assurance Team, Finance Team, IT / Dev Team, CRM Management>",
  "confidence": <number 0-100>,
  "matchedWord": "<the key phrase that triggered classification, or null>"
}

Category → Department mapping:
- Shipping → Logistics Team
- Quality → Quality Assurance Team
- Refund → Finance Team
- Technical → IT / Dev Team
- Others → CRM Management

Return ONLY valid JSON, no markdown, no explanation.`;

    try {
        const response = await fetch('https://api.openai.com/v1/chat/completions', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${OPENAI_API_KEY}`
            },
            body: JSON.stringify({
                model: OPENAI_MODEL,
                max_tokens: 150,
                temperature: 0.1,
                messages: [
                    { role: 'system', content: systemPrompt },
                    { role: 'user', content: `Customer message: "${text}"` }
                ]
            })
        });

        if (!response.ok) {
            const err = await response.json();
            console.warn('OpenAI error:', err);
            updateStatusPanel(`OpenAI error: ${err.error?.message || response.status}. Using fallback.`, 'red');
            return classifyTextFallback(text);
        }

        const data = await response.json();
        const raw = data.choices[0]?.message?.content?.trim();
        const parsed = JSON.parse(raw.replace(/```json|```/g, '').trim());
        updateStatusPanel(`AI classified as "${parsed.category}" with ${parsed.confidence}% confidence.`, 'green');
        return parsed;
    } catch (e) {
        console.warn('Classification error:', e);
        updateStatusPanel('AI classification failed. Using keyword fallback.', 'orange');
        return classifyTextFallback(text);
    }
}

// Fallback: keyword-based (original logic)
function classifyTextFallback(text) {
    const textLower = text.toLowerCase();
    for (const [category, data] of Object.entries(taxonomy)) {
        if (category === 'Others') continue;
        for (const [issue, keywords] of Object.entries(data.issues)) {
            for (const word of keywords) {
                if (textLower.includes(word.toLowerCase())) {
                    return { category, issue, dept: data.department, matchedWord: word, confidence: null };
                }
            }
        }
    }
    return { category: 'Others', issue: 'Not detected', dept: 'CRM Management', matchedWord: null, confidence: null };
}

// ================================================================
// METRICS
// ================================================================
function getMetrics() {
    const total = feedbackList.length;
    const resolved = feedbackList.filter(f => f.status === 'Resolved').length;
    const unresolved = total - resolved;
    const resolutionRate = total > 0 ? ((resolved / total) * 100).toFixed(1) : 0;
    const resolutionRateNum = parseFloat(resolutionRate);
    // Derive a satisfaction card state from resolution rate
    let satisfaction = 'Bad';
    let satisfactionCardClass = 'bg-red-500';
    let satisfactionEmoji = '😡';
    let satisfactionColorClass = 'text-rose-700 bg-rose-50 border-rose-200';
    let satisfactionDotClass = 'bg-rose-400';
    if (resolutionRateNum > 80) {
        satisfaction = 'Excellent';
        satisfactionCardClass = 'bg-green-500';
        satisfactionEmoji = '😆';
        satisfactionColorClass = 'text-emerald-700 bg-emerald-50 border-emerald-200';
        satisfactionDotClass = 'bg-emerald-400';
    } else if (resolutionRateNum > 60) {
        satisfaction = 'Okay';
        satisfactionCardClass = 'bg-blue-500';
        satisfactionEmoji = '😄';
        satisfactionColorClass = 'text-sky-700 bg-sky-50 border-sky-200';
        satisfactionDotClass = 'bg-sky-400';
    } else if (resolutionRateNum > 20) {
        satisfaction = 'Not okay';
        satisfactionCardClass = 'bg-purple-500';
        satisfactionEmoji = '😣';
        satisfactionColorClass = 'text-violet-700 bg-violet-50 border-violet-200';
        satisfactionDotClass = 'bg-violet-400';
    }
    return { total, unresolved, resolutionRate: `${resolutionRate}%`, resolutionRateNum, newCount: feedbackList.filter(f => f.status === 'Not contact yet').length, satisfaction, satisfactionCardClass, satisfactionEmoji, satisfactionColorClass, satisfactionDotClass };
}

function getDepartmentStats() {
    const stats = { 'Logistics Team': { total: 0, resolved: 0 }, 'Quality Assurance Team': { total: 0, resolved: 0 }, 'Finance Team': { total: 0, resolved: 0 }, 'IT / Dev Team': { total: 0, resolved: 0 }, 'CRM Management': { total: 0, resolved: 0 } };
    const normDept = d => { const v = String(d||'').toLowerCase().trim(); if(v.includes('logistics')) return 'Logistics Team'; if(v.includes('quality')) return 'Quality Assurance Team'; if(v.includes('finance')) return 'Finance Team'; if(v.includes('it')) return 'IT / Dev Team'; if(v.includes('crm')) return 'CRM Management'; return null; };
    feedbackList.forEach(item => {
        String(item.dept||'').split(/[,;\/]+|\s+and\s+|\s*&\s*/i).map(d=>normDept(d.trim())).filter(Boolean).forEach(d => {
            if (stats[d]) { stats[d].total++; if (/resolved/i.test(item.status)) stats[d].resolved++; }
        });
    });
    return stats;
}

    const c = String(cat||'').toLowerCase();
    if (c.includes('shipping')) return 'bg-amber-50 text-amber-700 border-amber-200';
    if (c.includes('quality')) return 'bg-emerald-50 text-emerald-700 border-emerald-200';

    if (c.includes('technical')||c.includes('tech')) return 'bg-violet-50 text-violet-700 border-violet-200';
    return 'bg-rose-50 text-rose-700 border-rose-200';
}

    if (n.includes('delivery')||n.includes('tracking')||n.includes('late')) return 'bg-amber-50 text-amber-700 border-amber-200';
    if (n.includes('defect')||n.includes('broken')||n.includes('wrong item')||n.includes('does not match')) return 'bg-emerald-50 text-emerald-700 border-emerald-200';
    if (n.includes('refund')||n.includes('return')||n.includes('amount')) return 'bg-sky-50 text-sky-700 border-sky-200';
    if (n.includes('app')||n.includes('crash')||n.includes('checkout')||n.includes('payment')||n.includes('promo')) return 'bg-violet-50 text-violet-700 border-violet-200';
    return getCategoryBadgeClasses(cat);
}
function splitBadges(val) { return String(val||'').split(/[,;\/]+|\s+and\s+|\s*&\s*/i).map(s=>s.trim()).filter(Boolean); }
function formatCategoryBadges(cat) { return splitBadges(cat).map(l=>`<span class="px-2 py-0.5 rounded-full text-[10px] font-bold border ${getCategoryBadgeClasses(l)}">${l}</span>`).join(' '); }
function formatIssueBadges(issue, cat) { return splitBadges(issue).map(l=>`<span class="px-2 py-0.5 rounded-full text-[10px] font-bold border ${getIssueBadgeClasses(l,cat)}">${l}</span>`).join(' '); }

// ================================================================
// SIMULATION — async (uses OpenAI if key is set)
// ================================================================
async function runSimulation(event) {
    event.preventDefault();
    if (!simFeedbackText.trim() || isClassifying) return;
    isClassifying = true;
    updateStatusPanel('🤖 AI is analyzing the message...', 'blue');
    renderContent(); // show loading state

    const classification = await classifyWithOpenAI(simFeedbackText);
    const newId = `#${Math.floor(100000 + Math.random() * 900000)}`;
    const timeNow = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    const newTicket = {
        id: newId,
        time: `${timeNow}, ${new Date().toLocaleDateString('en-GB')}`,
        user: simCustomerName,
        category: classification.category,
        issue: classification.issue,
        dept: classification.dept,
        status: classification.category === 'Others' ? 'Not contact yet' : 'In process',
        text: simFeedbackText,
        aiConfidence: classification.confidence
    };
    feedbackList = [newTicket, ...feedbackList];
    simulationAlert = { id: newId, user: simCustomerName, matched: classification.matchedWord, category: classification.category, issue: classification.issue, dept: classification.dept, confidence: classification.confidence };
    isClassifying = false;
    simCustomerName = 'Oliver Queen';
    simFeedbackText = '';
    setTimeout(() => { simulationAlert = null; renderContent(); }, 9000);
    renderContent();
}

function closeEditModal() {
    document.getElementById('edit-modal').classList.replace('flex','hidden');
    modalState = {};
}

function saveEditModal() {
    if (!modalState.type) return closeEditModal();
    if (modalState.type === 'category') {
        const oldName = modalState.category;
        const newName = document.getElementById('modal-category-name').value.trim();
        const newDept = document.getElementById('modal-department').value.trim();
        if (!newName) return alert('Category name required');
        if (newName !== oldName) { taxonomy[newName] = taxonomy[oldName]; taxonomy[newName].department = newDept; delete taxonomy[oldName]; if (selectedCategory===oldName) selectedCategory=newName; }
        else taxonomy[oldName].department = newDept;
    } else {
        const { category, issue } = modalState;
        const newIssue = document.getElementById('modal-issue-name').value.trim();
        const keywords = document.getElementById('modal-issue-keywords').value.split(',').map(k=>k.trim()).filter(Boolean);
        if (!newIssue) return alert('Issue name required');
        taxonomy[category].issues[newIssue] = keywords;
        if (newIssue !== issue) delete taxonomy[category].issues[issue];
    }
    renderContent();
    closeEditModal();
}

function handleAddKeyword(issueName) {
    if (!newKeywordInput.trim()) return;
    const kw = newKeywordInput.trim().toLowerCase();
    const cur = taxonomy[selectedCategory].issues[issueName];
    if (!cur.includes(kw)) taxonomy[selectedCategory].issues[issueName] = [...cur, kw];
    newKeywordInput = '';
    renderContent();
}

function handleRemoveKeyword(issueName, kw) {
    taxonomy[selectedCategory].issues[issueName] = taxonomy[selectedCategory].issues[issueName].filter(k=>k!==kw);
    renderContent();
}

function setSelectedCategory(cat) { selectedCategory = cat; renderContent(); }
function setActiveChat(ch) { activeChat = ch; renderContent(); }

function handleSendMessage() {
    if (!typedMessage.trim()) return;
    const timeNow = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    chatChannels[activeChat] = [...chatChannels[activeChat], { sender: 'Admin', message: typedMessage, time: timeNow }];

}

                    </table>
                </div>
            </div>
        </div>`;

    } else if (currentTab === 'Feedback') {
        content.innerHTML = `
        <div class="bg-white rounded-3xl border border-slate-100 shadow-sm p-6 max-w-7xl mx-auto slide-in">
            <div class="flex justify-between items-center mb-5">
                <div>
                    <h2 class="text-[30px] font-extrabold text-slate-800">Master Feedback Log</h2>
                    <p class="text-[15px] text-slate-400 mt-0.5">All customer messages and their AI classification results</p>
                </div>
                <div class="flex gap-2">
                    <span class="px-3 py-1.5 bg-slate-100 text-slate-600 rounded-xl text-xs font-bold">Total: ${feedbackList.length}</span>
                    <span class="px-3 py-1.5 bg-blue-50 text-blue-600 rounded-xl text-xs font-bold">Unresolved: ${metrics.unresolved}</span>
                </div>
            </div>
            <div class="overflow-x-auto border border-slate-300 rounded-2xl">
                <table class="w-full text-left">
                    <thead><tr class="bg-slate-50 text-[10px] text-slate-400 uppercase tracking-wider font-bold border-b border-slate-100">
                        <th class="px-5 py-3.5">Order ID</th><th class="px-5 py-3.5">Timestamp</th><th class="px-5 py-3.5">Customer</th><th class="px-5 py-3.5 min-w-[220px]">Message</th><th class="px-5 py-3.5">Category</th><th class="px-5 py-3.5">Issue</th><th class="px-5 py-3.5 min-w-[130px]">Status</th>
                    </tr></thead>
                    <tbody>
                        ${feedbackList.map(item=>`
                        <tr class="border-b border-slate-50 hover:bg-slate-50/50 transition-colors">
                            <td class="px-5 py-3.5 text-xs font-bold text-slate-700">${item.id}</td>
                            <td class="px-5 py-3.5 text-[10px] text-slate-400 whitespace-nowrap font-medium">${item.time}</td>
                            <td class="px-5 py-3.5 text-sm font-bold text-slate-800 whitespace-nowrap">${item.user}</td>
                            <td class="px-5 py-3.5 text-[10px] text-slate-500 max-w-[220px] leading-relaxed">${item.text}</td>
                            <td class="px-5 py-3.5"><div class="flex flex-wrap gap-1">${formatCategoryBadges(item.category)}</div></td>
                            <td class="px-5 py-3.5"><div class="flex flex-wrap gap-1">${formatIssueBadges(item.issue, item.category)}</div></td>
                            <td class="px-5 py-3.5">
                                <span class="px-2.5 py-1 rounded-full text-[10px] font-bold border ${item.status==='Resolved'?'bg-green-50 border-green-100 text-green-700':item.status==='In process'?'bg-blue-50 border-blue-100 text-blue-700':'bg-orange-50 border-orange-100 text-orange-700'}">${item.status}</span>
                            </td>
                        </tr>`).join('')}
                    </tbody>
                </table>
            </div>
        </div>`;

    } else if (currentTab === 'Process') {
        content.innerHTML = `
        <div class="max-w-7xl mx-auto slide-in">
            <div class="bg-white p-6 rounded-3xl border border-slate-300 shadow-sm">
                <h2 class="text-[30px] font-extrabold text-slate-800">Feedback Resolution Lifecycle</h2>
                <p class="text-[10px] text-slate-400 mb-6">Trace how each ticket progresses from ingest to resolution</p>
                <div class="space-y-3">
                    ${feedbackList.map(item=>`
                    <div class="p-4 border border-slate-100 bg-slate-50/30 rounded-2xl flex flex-col md:flex-row md:items-center justify-between gap-3 hover:border-slate-200 transition-colors">
                        <div>
                            <div class="flex items-center gap-2 mb-1">
                                <span class="text-[10px] font-black text-slate-400">${item.id}</span>
                                <span class="text-sm font-bold text-slate-800">${item.user}</span>
                                <span class="text-[10px] px-2 py-0.5 bg-orange-100 text-orange-600 font-bold rounded-lg">${item.category}</span>
                            </div>
                            <p class="text-[10px] text-slate-500 font-medium">${item.issue} → <span class="text-orange-500 font-semibold">${item.dept}</span></p>
                        </div>
                        <div class="flex items-center gap-1.5 flex-shrink-0">
                            ${[['Ingest',true],['Routed',item.status!=='Not contact yet'],['Resolved',item.status==='Resolved']].map(([label,done],i)=>`
                            <div class="flex items-center gap-1">
                                <div class="w-6 h-6 rounded-full flex items-center justify-center text-[9px] font-black ${done?'bg-green-500 text-white':'bg-slate-200 text-slate-400'}">${i+1}</div>
                                <span class="text-[9px] text-slate-400 font-bold hidden lg:block">${label}</span>
                            </div>
                            
                            ${i<2?`<div class="w-6 h-0.5 ${done&&[['Ingest',true],['Routed',item.status!=='Not contact yet'],['Resolved',item.status==='Resolved']][i+1]?.[1]?'bg-green-500':'bg-slate-200'}"></div>`:''}
                            `).join('')}
                        </div>
                    </div>`).join('')}
                </div>
            </div>
        </div>`;

    } else if (currentTab === 'Edit') {
        content.innerHTML = `
        <div class="max-w-7xl mx-auto slide-in">
            <div class="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm">
                <div class="mb-5">
                    <h2 class="text-[30px] font-extrabold text-slate-800">AI Pattern Config Editor</h2>
                    <p class="text-[10px] text-slate-400">Manage keyword rules for fallback classification (used when OpenAI API is unavailable)</p>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-12 gap-6">
                    <div class="md:col-span-3 space-y-1.5 border-r border-slate-100 pr-4">
                        <span class="text-[10px] font-bold text-slate-400 block mb-3 uppercase tracking-widest">Categories</span>
                        ${Object.keys(taxonomy).map(cat=>`
                        <div class="flex items-center gap-1.5">
                            <button onclick="setSelectedCategory('${cat}')" class="flex-1 text-left px-3.5 py-2.5 rounded-xl text-xs font-bold transition-all ${selectedCategory===cat?'bg-orange-500 text-white shadow-md shadow-orange-200':'text-slate-600 hover:bg-slate-100'}">${cat}</button>
                            <button onclick="openEditModal('category','${cat}')" class="w-8 h-8 flex items-center justify-center bg-slate-100 text-slate-500 rounded-lg hover:bg-slate-200 text-sm">✎</button>
                        </div>`).join('')}
                    </div>
                    <div class="md:col-span-9 space-y-4">
                        <div class="flex justify-between items-center bg-slate-50 p-3.5 rounded-2xl">
                            <div><span class="text-[9px] font-bold text-slate-400 block uppercase tracking-wider">Assigned Team</span><span class="text-sm font-black text-slate-800">${taxonomy[selectedCategory].department}</span></div>
                            <span class="px-2.5 py-1 bg-orange-100 text-orange-600 text-[10px] font-bold rounded-lg uppercase">Active</span>
                        </div>
                        ${Object.entries(taxonomy[selectedCategory].issues).map(([issueName,keywords])=>`
                        <div class="p-4 border border-slate-100 rounded-2xl bg-white space-y-3">
                            <div class="flex justify-between items-center">
                                <span class="text-sm font-bold text-slate-700">${issueName}</span>
                                <span class="text-[10px] text-slate-400 font-semibold">${keywords.length} keywords</span>
                            </div>
                            <div class="flex flex-wrap gap-1.5">
                                ${keywords.map(w=>`<span class="inline-flex items-center gap-1 px-2.5 py-1 bg-orange-50 border border-orange-100 rounded-full text-[10px] font-bold text-orange-600">${w}<button onclick="handleRemoveKeyword('${issueName}','${w.replace(/'/g,"\\'")}')">×</button></span>`).join('')}
                            </div>
                            <div class="flex gap-2 pt-1">
                                <input type="text" placeholder="Add keyword..." class="flex-1 bg-slate-50 border border-slate-200 rounded-xl px-3.5 py-2 text-xs focus:outline-none focus:border-orange-400" value="${newKeywordInput}" oninput="newKeywordInput=this.value" onkeydown="if(event.key==='Enter'){handleAddKeyword('${issueName}');event.preventDefault();}" />
                                <button onclick="handleAddKeyword('${issueName}')" class="px-4 py-2 bg-orange-500 hover:bg-orange-600 text-white rounded-xl text-xs font-bold transition-colors">Add</button>
                            </div>
                        </div>`).join('')}
                    </div>
                </div>
            </div>
        </div>`;

    } else if (currentTab === 'Chat') {
        const teamColors = { 'Logistics Team': 'bg-blue-500', 'Quality Assurance Team': 'bg-purple-500', 'Finance Team': 'bg-emerald-500', 'IT / Dev Team': 'bg-rose-500' };
        content.innerHTML = `
        <div class="max-w-7xl mx-auto h-[620px] bg-white rounded-3xl border border-slate-100 shadow-sm flex overflow-hidden slide-in">
            <!-- Sidebar channels -->
            <div class="w-72 border-r border-slate-100 flex flex-col flex-shrink-0">
                <div class="p-4 border-b border-slate-50 bg-slate-50/50">
                   <h2 class="text-[30px] font-extrabold text-slate-800">Channels</span>
                    <p class="text-[10px] text-slate-400 font-medium">Communicate with departments</p>
                </div>
                <div class="flex-1 overflow-y-auto p-2 space-y-1">
                    ${Object.keys(chatChannels).map(ch=>`
                    <button onclick="setActiveChat('${ch}')" class="w-full p-3 rounded-2xl text-left flex items-center gap-3 transition-all ${activeChat===ch?'bg-orange-50 border border-orange-100':'hover:bg-slate-50'}">
                        <div class="w-9 h-9 rounded-full flex items-center justify-center font-black text-xs text-white flex-shrink-0 ${teamColors[ch]||'bg-slate-500'}">${ch.charAt(0)}</div>
                        <div class="overflow-hidden">
                            <p class="text-xs font-bold text-slate-800">${ch}</p>
                            <p class="text-[9px] text-slate-400 truncate">${chatChannels[ch][chatChannels[ch].length-1].message.substring(0,40)}...</p>
                        </div>
                    </button>`).join('')}
                </div>
            </div>
            <!-- Chat area -->
            <div class="flex-1 flex flex-col overflow-hidden">
                <div class="p-4 border-b border-slate-100 flex items-center gap-3 bg-slate-50/40">
                    <div class="w-9 h-9 rounded-full flex items-center justify-center font-bold text-white text-sm ${teamColors[activeChat]||'bg-slate-500'}">${activeChat.charAt(0)}</div>
                    <div>
                        <p class="font-bold text-sm text-slate-800">${activeChat}</p>
                        <p class="text-[10px] text-green-500 flex items-center gap-1 font-semibold"><span class="w-1.5 h-1.5 bg-green-500 rounded-full"></span>Online</p>
                    </div>
                </div>
                <div class="flex-1 p-5 overflow-y-auto space-y-3 bg-slate-50/20">
                    ${chatChannels[activeChat].map((msg,i)=>`
                    <div class="flex ${msg.sender==='Admin'?'justify-end':'justify-start'}">
                        <div class="p-3.5 rounded-2xl max-w-sm ${msg.sender==='Admin'?'bg-orange-500 text-white rounded-tr-none shadow-md shadow-orange-100':'bg-white text-slate-800 rounded-tl-none border border-slate-100 shadow-sm'}">
                            <p class="text-[9px] font-bold mb-1 opacity-60">${msg.sender}</p>
                            <p class="text-xs font-medium leading-relaxed">${msg.message}</p>
                            <p class="text-[8px] text-right mt-1.5 opacity-50">${msg.time}</p>
                        </div>
                    </div>`).join('')}
                </div>
                <div class="p-4 border-t border-slate-100 flex gap-2 bg-white">
                    <input type="text" placeholder="Message ${activeChat}..." class="flex-1 bg-slate-50 border border-slate-200 rounded-2xl px-4 py-2.5 text-xs focus:outline-none focus:border-orange-400 transition-colors" value="${typedMessage}" oninput="typedMessage=this.value" onkeydown="if(event.key==='Enter'){handleSendMessage();}" />
                    <button onclick="handleSendMessage()" class="bg-orange-500 hover:bg-orange-600 text-white px-4 py-2.5 rounded-2xl shadow-lg shadow-orange-100 transition-colors">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>
                    </button>
                </div>
            </div>
        </div>`;
    }
}

// Init
if (OPENAI_API_KEY) {
    document.addEventListener('DOMContentLoaded', () => {
        const inp = document.getElementById('api-key-input');
        if (inp) { inp.value = OPENAI_API_KEY; setApiKey(OPENAI_API_KEY); }
    });
}
initMenu();
renderContent();
</script>
</body>
</html>
